<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>北京100个打卡景点清单</title>
  <!-- SheetJS for Excel parsing -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <!-- mammoth.js for Word parsing -->
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="dashboard-top">
      <!-- Header -->
      <header>
        <div class="header-left">
          <span class="header-icon">🏮</span>
          <h1>北京打卡景点清单</h1>
        </div>
        <div class="header-right">
          <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="stats" id="stats">已打卡: 0 / 0</div>
          <div class="account-entry">
            <span id="databaseLabel">数据库: 本地</span>
            <form id="databaseSwitchForm" class="database-switch-form">
              <input type="text" id="databaseNameInput" list="databaseNameList" placeholder="仅保留数据库1" autocomplete="off" aria-label="仅保留数据库1">
              <datalist id="databaseNameList"></datalist>
              <button class="btn-link" id="databaseSwitchBtn" type="submit">切换</button>
            </form>
            <span id="authStatus">本地模式</span>
            <button class="btn-link" id="databaseNameEntryBtn">✏️ 名称</button>
          </div>
        </div>
      </header>

      <!-- Import Section -->
      <section class="import-section" id="importSection">
        <div class="drop-zone" id="dropZone">
          <div class="drop-icon">📁</div>
          <h2>导入清单数据</h2>
          <p class="format-hint">支持 Word、PDF、Excel</p>
          <button class="btn-primary" id="importBtn">选择文件</button>
          <input type="file" id="fileInput" accept=".docx,.pdf,.xlsx,.xls" hidden>
          <p class="hint">或将文件拖放至此</p>
          <div class="sample-tip">
            <strong>提示：</strong>可自动识别常见列表格式。由于是完全基于本地或个人数据库运行，我们不会保存您的任何核心敏感数据。拖入解析成功后，你的页面会自动更新！
          </div>
        </div>
      </section>
    </div>

    <!-- Attractions Section -->
    <section class="attractions-section" id="attractionsSection" hidden>
      <div class="filters-layout-wrap">
        <div class="toolbar">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="search" id="searchInput" class="search-input"
                   placeholder="搜索景点名称、介绍或标签…" autocomplete="off">
            <button class="search-clear" id="searchClearBtn" hidden aria-label="清除搜索">✕</button>
          </div>
          <div class="filter-btns">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="visited">已打卡</button>
            <button class="filter-btn" data-filter="unvisited">未打卡</button>
          </div>
          <button class="btn-secondary manage-btn" id="manageBtn" title="内容管理">⚙️ 管理</button>
        </div>

        <section class="tag-browser" id="tagBrowser">
          <div class="tag-browser-head">
            <h2>🏷️ 标签浏览</h2>
            <button class="btn-link" id="clearTagFilterBtn" hidden>清除标签筛选</button>
          </div>
          <div class="tag-browser-list" id="tagBrowserList"></div>
        </section>
      </div>

      <div class="attractions-list" id="attractionsList"></div>
    </section>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay" hidden>
    <div class="spinner"></div>
    <p>正在解析文件，请稍候…</p>
  </div>

  <!-- Photo Lightbox Modal -->
  <div class="modal" id="photoModal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="关闭">✕</button>
      <button class="modal-download" id="modalDownload" aria-label="下载当前媒体" title="下载">⤓</button>
      <img id="modalImage" src="" alt="放大图片">
      <video id="modalVideo" controls playsinline hidden></video>
    </div>
  </div>

  <div class="manager-drawer" id="managerDrawer" hidden>
    <div class="manager-drawer-backdrop" id="managerDrawerBackdrop"></div>
    <aside class="manager-drawer-panel">
      <div class="manager-drawer-head">
        <h2>🧩 内容管理</h2>
        <button class="modal-close" id="managerDrawerClose" aria-label="关闭">✕</button>
      </div>
      <div class="manager-drawer-actions">
        <button class="btn-secondary" id="importMoreBtn">📤 导入更多</button>
      </div>
      <div class="content-manager-grid">
        <form class="add-form" id="addAttractionForm">
          <h3>新增景点</h3>
          <input type="text" id="newAttractionName" placeholder="景点名称（必填）" required>
          <textarea id="newAttractionDescription" rows="3" placeholder="景点介绍（可选）"></textarea>
          <input type="text" id="newAttractionTag" placeholder="标签（可选，如：古迹）">
          <button type="submit" class="btn-primary">➕ 添加内容</button>
        </form>

        <div class="delete-panel">
          <h3>删除景点</h3>
          <select id="deleteAttractionSelect"></select>
          <button class="btn-secondary btn-danger" id="deleteAttractionBtn">🗑️ 删除选中项</button>
          <button class="btn-secondary btn-danger" id="clearBtn">🧨 清空全部内容</button>
        </div>
      </div>
    </aside>
  </div>

  <div class="auth-modal" id="authModal" hidden>
    <div class="auth-modal-backdrop" id="authModalBackdrop"></div>
    <div class="auth-modal-content">
      <button class="modal-close" id="authModalClose" aria-label="关闭">✕</button>
      <h2>数据库名称管理</h2>
      <p class="auth-hint" id="authHint">当前仅保留数据库1。</p>
      <form id="databaseRenameForm">
        <select id="databaseRenameSlot" aria-label="选择要重命名的数据库"></select>
        <input type="text" id="databaseRenameInput" placeholder="输入新的数据库名字" maxlength="30" aria-label="输入新的数据库名字" required>
        <button type="submit" class="btn-primary auth-submit">保存数据库名字</button>
      </form>
      <div class="auth-actions">
        <button class="btn-secondary" id="authModalDoneBtn">完成</button>
      </div>
    </div>
  </div>

  <script>
    // 可选读取本地私有配置 js/config.js（该文件建议加入 .gitignore）。
    // 即使该文件不存在，也不会影响页面正常运行。
    function loadOptionalAppConfig() {
      return new Promise((resolve) => {
        const script = document.createElement('script');
        script.src = 'js/config.js';
        script.onload = resolve;
        script.onerror = resolve;
        document.head.appendChild(script);
      });
    }

    // 也可通过 URL 参数临时覆盖（会写入本地缓存）：
    // ?apiBaseUrl=http://your-server-ip:3000&apiKey=your-api-key&userId=your-user-id
    function initCloudSyncConfig() {
      const STORAGE_KEY = 'beijing_cloud_sync_runtime_config_v1';
      const params = new URLSearchParams(window.location.search);

      const queryConfig = {
        apiBaseUrl: String(params.get('apiBaseUrl') || '').trim(),
        apiKey: String(params.get('apiKey') || '').trim(),
        userId: String(params.get('userId') || '').trim(),
      };

      const defaultConfig = window.APP_CONFIG || {
        apiBaseUrl: '',
        apiKey: '',
        userId: '',
      };

      // For cross-device consistency, ignore stale cached credentials by default.
      // URL params can still override values for temporary debugging.
      const mergedConfig = {
        apiBaseUrl: queryConfig.apiBaseUrl || defaultConfig.apiBaseUrl,
        apiKey: queryConfig.apiKey || defaultConfig.apiKey,
        userId: queryConfig.userId || defaultConfig.userId,
      };

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(mergedConfig));
      } catch (_) {
        // Ignore storage write failures and continue with in-memory config.
      }

      window.CLOUD_SYNC_CONFIG = Object.assign(
        {},
        mergedConfig,
        window.CLOUD_SYNC_CONFIG || {}
      );
    }

    (async function bootstrapCloudSyncConfig() {
      await loadOptionalAppConfig();
      initCloudSyncConfig();
    })();
  </script>
  <script src="js/default-attractions.js?v=20260417-1"></script>
  <script src="js/auth.js?v=20260417-1"></script>
  <script src="js/app.js?v=20260417-5"></script>
  <script>
    (function bootstrapDiagnostics() {
      function safeText(value) {
        return String(value == null ? '' : value);
      }

      window.addEventListener('error', function (event) {
        if (!window.console || !window.console.error) return;
        window.console.error('Client runtime error:', {
          message: safeText(event && event.message),
          file: safeText(event && event.filename),
          line: Number(event && event.lineno) || 0,
          column: Number(event && event.colno) || 0,
        });
      });

      setTimeout(function () {
        if (window.__APP_BOOT_OK__) return;
        if (!window.console || !window.console.warn) return;
        window.console.warn('App bootstrap is taking longer than expected on this device.');
      }, 12000);
    })();
  </script>
</body>
</html>
